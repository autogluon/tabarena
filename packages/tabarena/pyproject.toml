[build-system]
requires = ["setuptools>=77", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tabarena"
version = "0.0.1"
description = "A Living Benchmark for Machine Learning on Tabular Data"
readme = "README.md"
license = "Apache-2.0"
authors = [{ name = "TabArena Community" }]
requires-python = ">=3.11,<3.14"
keywords = [
  "tabular",
  "machine-learning",
  "benchmark",
  "automl",
  "autogluon",
  "ensemble",
  "deep-learning",
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Science/Research",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

# NOTE: To allow pre-release resolution of AutoGluon with uv, install with:
#   uv pip install --prerelease=allow .
dependencies = [
  # Minimal evaluation/leaderboard core. Heavier capabilities live in
  # the optional extras below: plotting -> [plot], text embeddings -> [text],
  # skrub feature generators -> [preprocessing], model fitting -> [benchmark].
  #
  # We depend on `autogluon.tabular` (the tabular distribution) rather than the full
  # `autogluon` meta-package, which would also pull in `autogluon.multimodal` /
  # `autogluon.timeseries` (torch, transformers, ...). `autogluon.tabular` transitively
  # provides `autogluon.{common,core,features}`, which is everything the code uses.
  # To use `uv`, you need to do `uv pip install --prerelease=allow .` so it recognizes pre-release AutoGluon.
  "autogluon.tabular>=1.5,<1.6",
  "bencheval",
  "openml>=0.14.1",
  "pyyaml",
  "tqdm",
  "typing-extensions>=4.11,<5",  # used for `Self` type hint
  "huggingface-hub",
  "numpy",
  "pandas",
  "loguru",
  "ray>=2.43,<2.54",  # range matches autogluon.core
]

[project.optional-dependencies]

# Plotting / leaderboard visualization (the `tabarena.plot` modules + bencheval plots).
# All plotting imports are lazy, so the core install never requires these.
plot = [
  "matplotlib==3.10.1",
  "seaborn==0.13.2",
  "plotly>=6.3.0",
  "tueplots",
  "autorank==1.2.1",
  "adjusttext",  # for pareto front plots
]

# Semantic text features: the sentence-transformers embedding model used by the
# tabarena_default preprocessing. Heavy (pulls torch); imported lazily at encode time.
text = ["sentence_transformers>=5.4"]

# skrub-based feature generators (datetime + statistical-text) used by the
# tabarena_default preprocessing. Light; imported lazily inside the generators.
preprocessing = ["skrub"]

# Data Foundry integration: lets `tabarena.benchmark.task.data_foundry` convert
# curated containers into TabArena UserTasks. Included in the `benchmark` union.
# FIXME: To use `uv`, you need to do `uv pip install --prerelease=allow .` so it recognizes pre-release data-foundry
data-foundry = ["data-foundry>=0.0.3"]

# Core model extras — installed together via the `benchmark` union below.
tabpfn = [
  "tabpfn>=8.0.8",
  "tabpfn-extensions[many_class] @ git+https://github.com/PriorLabs/tabpfn-extensions.git",
]
tabicl = ["tabicl>=2.0.0"]
ebm = ["autogluon.tabular[interpret]>=1.5,<1.6"]
search_spaces = ["configspace>=1.2,<2.0"]
realmlp = ["pytabkit>=1.5.0,<2.0"]
tabdpt = ["tabdpt>=1.2.0"]
tabm = ["torch"]

# Extended model extras — opt-in individually or together via the `extended` union below.
modernnca = ["category_encoders"]
xrfm = ["xrfm[cu12]"]
sap-rpt-oss = ["sap_rpt_oss @ git+https://github.com/SAP-samples/sap-rpt-1-oss.git@a323a0aff976fda4ac43c3196a92406de7689aaa"]
# TabFM uses its PyTorch backend; the `[pytorch]` extra pulls `torch` for GPU/CPU execution.
tabfm = ["tabfm[pytorch] @ git+https://github.com/google-research/tabfm.git@53f3fcfb8a3355f55c9fb49f04fbb62b8ba29109"]
tabprep = []
tabstar = ["tabstar==1.1.15"]
perpetualboosting = ["perpetual"] # We used version 2.1.0
orionmsp = ["tabtune @ git+https://github.com/Lexsi-Labs/TabTune.git"] # from main to get newest code
probmetrics = [
    "probmetrics",
    "pytorch-minimize",
]
limix = [
  "einops",
  "kditransform",
]
tabpfnwide = ["tabpfnwide>=0.3.0"]
iltm = ["iltm>=0.1.1"]
chimeraboost = ["chimeraboost>=0.13.0"]
nori = ["synthefy-nori>=0.7.0"]
# TabSwift is vendored under models/tabswift/_vendor/ (not pip-installable). All of its
# runtime deps (torch, numpy, scikit-learn, scipy, psutil, tqdm, huggingface_hub, packaging)
# are already in the base tree, so this extra is intentionally empty.
tabswift = []

# Core benchmark set: the always-on models for benchmarking, plus the plotting and
# preprocessing capabilities split out of the core install. Self-references avoid
# duplicating package specs.
benchmark = [
  "tabarena[tabpfn]",
  "tabarena[tabicl]",
  "tabarena[ebm]",
  "tabarena[search_spaces]",
  "tabarena[realmlp]",
  "tabarena[tabdpt]",
  "tabarena[tabm]",
  "tabarena[data-foundry]",
  "tabarena[plot]",
  "tabarena[text]",
  "tabarena[preprocessing]",
]

# Extended set: extra models layered on top of `benchmark` when needed.
# Note: `probmetrics` is intentionally excluded — install it explicitly via `tabarena[probmetrics]` or `tabarena[all]`.
extended = [
  "tabarena[modernnca]",
  "tabarena[xrfm]",
  "tabarena[sap-rpt-oss]",
  "tabarena[tabfm]",
  "tabarena[tabprep]",
  "tabarena[tabstar]",
  "tabarena[perpetualboosting]",
  "tabarena[orionmsp]",
  "tabarena[limix]",
  "tabarena[tabpfnwide]",
  "tabarena[iltm]",
  "tabarena[chimeraboost]",
  "tabarena[nori]",
  "tabarena[tabswift]",
]

# Convenience: everything (core + extended + probmetrics).
all = [
  "tabarena[benchmark]",
  "tabarena[extended]",
  "tabarena[probmetrics]",
]

[project.urls]
Homepage = "https://github.com/autogluon/tabarena"

# PEP 735 dependency groups: dev-only tools, not shipped in the wheel.
# Install with: `uv sync --group dev`  (or `--group lint`, `--group test`).
# NOTE: keep the ruff pin in sync with .github/workflows/pytest-pytest.yml and
# .pre-commit-config.yaml so local, pre-commit, and CI all agree.
[dependency-groups]
lint = ["ruff==0.14.0"]
test = ["pytest>=7"]
dev = [{ include-group = "lint" }, { include-group = "test" }]

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
include = ["tabarena*"]

[tool.setuptools.package-data]
tabarena = [
  "metrics/_roc_auc_cpp/compile.sh",
  "metrics/_roc_auc_cpp/cpp_auc.cpp",
  "benchmark/task/metadata/data/curated_tabarena_dataset_metadata.csv",
  "benchmark/task/metadata/sources/data/*.csv",
  "contexts/beyondarena/data/*.csv",
  "benchmark/models/ag/limix/_vendor/config/*.json",
  "benchmark/models/ag/limix/_vendor/LICENSE.txt",
  "benchmark/models/ag/limix/_vendor/README.md",
]
