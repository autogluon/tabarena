[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bencheval"
version = "0.0.1"
requires-python = ">=3.10,<3.14"
license = { text = "Apache-2.0" }
authors = [{ name = "AutoGluon Community" }]
dependencies = [
    "scipy",
    "numpy",
    "pandas",
    "tqdm",
    "typing-extensions>=4.11,<5",  # used for `Self` type hint
    "scikit-learn",
]

# Plotting is optional: the `bencheval._plotting` mixin imports matplotlib/seaborn/plotly
# lazily, so metrics/leaderboard computation works from the minimal install. Install
# `bencheval[plot]` (or `tabarena[plot]`, which includes the same libs) to render plots.
[project.optional-dependencies]
plot = [
    "seaborn==0.13.2",
    "matplotlib==3.10.1",
    "plotly>=6.3.0",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["bencheval*"]

#[tool.setuptools]
#package-dir = {}
#packages = ["bencheval"]

[project.urls]
Homepage = "https://github.com/autogluon/tabarena"
