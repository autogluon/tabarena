[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tabflow_slurm"
version = "0.0.1"
requires-python = ">=3.11,<3.14"
dependencies = [
    "tabarena",
]

[tool.uv.sources]
tabarena = { workspace = true }

[tool.setuptools]
package-dir = { "" = "src" }
packages = ["tabflow_slurm", "tabflow_slurm.setup"]

[tool.setuptools.package-data]
# Ship the SLURM submit template alongside the package so
# `get_submit_script_path()` resolves in wheel/sdist installs too.
tabflow_slurm = ["*.sh"]
