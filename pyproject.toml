[tool.uv.workspace]
members = ["packages/tabarena", "packages/bencheval", "packages/tabflow_slurm"]

[tool.uv.sources]
tabarena = { workspace = true }
bencheval = { workspace = true }

# Pytest config for the whole workspace. All tests live in the single top-level
# `tests/` dir (mirroring src; the bencheval/tabflow_slurm packages have their
# own subfolders under it).
[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
  "network: test requires internet access (e.g. downloads a model from Hugging Face)",
  "models: fits a real model via AutoGluon's FitHelper (needs model extras; slow)",
]
# Skip network- and model-fitting tests by default to keep PR CI fast and
# deterministic. The nightly workflow opts back in with `pytest -m "network or
# models"` (a command-line `-m` overrides this one). Run them locally the same way.
addopts = "-m 'not network and not models'"
