# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"

#      - name: Install common gcc dependencies
#        run: |
#          sudo apt update
#          sudo apt install libcppunit-dev cmake -y
#          cmake --version
#
#      - name: Print gcc version
#        run: |
#          gcc --version

      # Install uv directly from Astral’s installer
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          uv --version

      - name: Install dependencies with uv
        run: |
          # Upgrade build backends first
          uv pip install --system --upgrade setuptools wheel

          # Allow prerelease versions of AutoGluon. Install tabarena editable with the
          # [plot] + [preprocessing] extras (plotting/skrub unit tests) and [data-foundry]
          # (un-skips the data_foundry-gated task/validation tests), plus the
          # tabflow_slurm package so its tests run instead of importorskip-ing. We
          # intentionally do NOT install [text]/[benchmark]: those pull torch + model
          # libs; model-fitting tests run in the nightly workflow, keeping this job fast.
          uv pip install --system --prerelease=allow \
            -e "./packages/tabarena[plot,preprocessing,data-foundry]" \
            -e "./packages/tabflow_slurm"

          # Optional tools
          uv pip install --system pytest

      - name: Test with pytest
        run: |
          pytest

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          uv --version

      # Keep this version in sync with .pre-commit-config.yaml and the `lint`
      # dependency group in packages/tabarena/pyproject.toml.
      - name: Install ruff
        run: uv pip install --system "ruff==0.14.0"

      - name: "Ruff lint (config: ruff.toml)"
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .