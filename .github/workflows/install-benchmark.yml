# Verify that `tabarena[benchmark]` resolves and installs end-to-end.
# This complements pytest-pytest.yml, which only installs the eval-only extras.

name: install-benchmark

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install-benchmark:
    name: Install tabarena[benchmark]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          uv --version

      - name: Install tabarena[benchmark]
        run: |
          uv pip install --system --upgrade setuptools wheel
          uv pip install --system --prerelease=allow -e "./packages/tabarena[benchmark]"

      - name: Verify import
        run: |
          python -c "import tabarena; print('tabarena import OK')"
